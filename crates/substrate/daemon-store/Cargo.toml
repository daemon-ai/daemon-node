[package]
name = "daemon-store"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true

[features]
default = []
sqlite = ["dep:rusqlite", "dep:rusqlite_migration"]

[dependencies]
daemon-common = { workspace = true }
serde = { workspace = true }
ciborium = { workspace = true }
async-trait = { workspace = true }
thiserror = { workspace = true }
# SQLite backend (feature-gated). `bundled` compiles the amalgamation from source so the durable
# store needs no system libsqlite3.
rusqlite = { version = "0.37", features = ["bundled"], optional = true }
rusqlite_migration = { workspace = true, optional = true }

[dev-dependencies]
tokio = { workspace = true }

[lints]
workspace = true

[package.metadata.cargo-machete]
# False positives / deps wired up during active development (macro- or feature-only use that
# cargo-machete cannot see, or in-progress crates). Intentional; do not auto-remove.
ignored = ["ciborium"]
