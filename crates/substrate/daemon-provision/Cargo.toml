[package]
name = "daemon-provision"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true

[features]
default = ["process"]
process = []
container = []

[dependencies]
# `process` gives `EnvPolicy::apply`, the sanctioned child-env application at `spawn_framed`.
daemon-common = { workspace = true, features = ["process"] }
tokio = { workspace = true }
async-trait = { workspace = true }
thiserror = { workspace = true }
tracing = { workspace = true }

[lints]
workspace = true

[package.metadata.cargo-machete]
# False positives / deps wired up during active development (macro- or feature-only use that
# cargo-machete cannot see, or in-progress crates). Intentional; do not auto-remove.
ignored = ["tracing"]
