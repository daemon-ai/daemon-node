[package]
name = "daemon-transport"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true

[features]
default = ["remote"]
remote = []

[dependencies]
daemon-common = { workspace = true }
daemon-protocol = { workspace = true }
daemon-supervision = { workspace = true }
daemon-store = { workspace = true }
daemon-telemetry = { workspace = true }
tokio = { workspace = true }
serde = { workspace = true }
ciborium = { workspace = true }
async-trait = { workspace = true }
thiserror = { workspace = true }
tracing = { workspace = true }

[dev-dependencies]
daemon-core = { workspace = true }
daemon-host = { workspace = true }

[lints]
workspace = true

[package.metadata.cargo-machete]
# False positives / deps wired up during active development (macro- or feature-only use that
# cargo-machete cannot see, or in-progress crates). Intentional; do not auto-remove.
ignored = ["async-trait", "daemon-protocol"]
