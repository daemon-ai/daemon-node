[package]
name = "daemon-host"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true

# Phase-5 scope adds `daemon-provision`: the host owns the protocol-aware side of a placement cut.
# Phase-6 adds `daemon-telemetry`: the host threads a `TraceId` across the cut (restore-on-receive),
# folds unit `Usage` into a resident `Metrics`, and (6b) drives the verifiable trace journal. The
# remaining deferred deps (daemon-credentials, daemon-transport) land with credential authority /
# cross-node distribution.
[dependencies]
daemon-common = { workspace = true }
daemon-protocol = { workspace = true }
daemon-supervision = { workspace = true }
daemon-api = { workspace = true }
daemon-core = { workspace = true }
daemon-store = { workspace = true }
daemon-activation = { workspace = true }
# I15 cron: schedule parsing + next-fire (croner) for the CronOps create/update/list surface.
daemon-schedule = { workspace = true }
daemon-provision = { workspace = true }
daemon-credentials = { workspace = true }
daemon-telemetry = { workspace = true }
# The model-management facade backing the node's `ModelApi` sub-surface (search/download/catalog).
daemon-models = { workspace = true }
tokio = { workspace = true }
tokio-util = { workspace = true }
tokio-stream = { workspace = true }
futures = { workspace = true }
dashmap = { workspace = true }
arc-swap = { workspace = true }
async-trait = { workspace = true }
thiserror = { workspace = true }
tracing = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
ciborium = { workspace = true }
# content hashing for the append-only profile/skill revision log (content-addressed snapshot blobs).
sha2 = { workspace = true }
# regex-mode project search for the filesystem surface (daemon-fs-surface-spec.md `fs_search`).
regex = { workspace = true }
# the file-backed skills store backing the node's skill versioning + distribution ops.
daemon-skills = { workspace = true }

[lints]
workspace = true
