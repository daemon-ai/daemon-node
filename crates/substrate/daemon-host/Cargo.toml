[package]
name = "daemon-host"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true

# Phase-5 scope adds `daemon-provision`: the host owns the protocol-aware side of a placement cut.
# Phase-6 adds `daemon-telemetry`: the host threads a `TraceId` across the cut (restore-on-receive),
# folds unit `Usage` into a resident `Metrics`, and (6b) drives the verifiable trace journal. The
# remaining deferred deps (daemon-credentials, daemon-transport) land with credential authority /
# cross-node distribution.
[features]
default = []
# Wire the user-feedback outbox drain to daemon-telemetry's real OTLP log exporter. OFF by default
# (the drain then stays inert and records queue). Forwarded from `bins/daemon`'s own `otel` feature,
# mirroring how `daemon-core/otel` is forwarded there.
otel = ["daemon-telemetry/otel"]

[dependencies]
daemon-common = { workspace = true, features = ["governor"] }
daemon-protocol = { workspace = true }
daemon-supervision = { workspace = true }
daemon-api = { workspace = true }
# RBAC + identity foundation: the per-request capability gate + task-local request context (authz
# core, Auth 2) and the node authenticator (authn.rs, Auth 3, a SessionCallback over `AuthStore`)
# both consume the transport-agnostic Capability/Role/Principal vocabulary + the identity store.
daemon-auth = { workspace = true }
daemon-core = { workspace = true }
daemon-store = { workspace = true }
daemon-activation = { workspace = true }
# I15 cron: schedule parsing + next-fire (croner) for the CronOps create/update/list surface.
daemon-schedule = { workspace = true }
daemon-provision = { workspace = true }
daemon-credentials = { workspace = true }
daemon-telemetry = { workspace = true }
# The model-management facade backing the node's `ModelApi` sub-surface (search/download/catalog).
daemon-models = { workspace = true }
tokio = { workspace = true }
tokio-util = { workspace = true }
tokio-stream = { workspace = true }
futures = { workspace = true }
dashmap = { workspace = true }
arc-swap = { workspace = true }
async-trait = { workspace = true }
thiserror = { workspace = true }
tracing = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
ciborium = { workspace = true }
# SASL authentication state machine for the api handshake (authn.rs).
rsasl = { workspace = true }
# TLS for the TCP api transport (tls.rs). PEM cert/key loading uses the maintained `PemObject`
# reader re-exported by rustls' pki-types (no separate rustls-pemfile dep).
tokio-rustls = { workspace = true }
# The plain-WebSocket carrier for the same mux (ws.rs): one binary WS message per CBOR frame, for
# browser (Qt WASM) clients that cannot open Unix sockets or raw TLS TCP. Already in the tree via
# axum's ws feature; wss termination is a reverse proxy's job, so no TLS features here.
tokio-tungstenite = { workspace = true }
# content hashing for the append-only profile/skill revision log (content-addressed snapshot blobs).
sha2 = { workspace = true }
# HMAC-SHA256 for deterministic decoy SCRAM material (anti-oracle) + OS entropy for the decoy secret.
hmac = "0.12"
getrandom = "0.2"
# regex-mode project search for the filesystem surface (daemon-fs-surface-spec.md `fs_search`).
regex = { workspace = true }
# the file-backed skills store backing the node's skill versioning + distribution ops.
daemon-skills = { workspace = true }

[dev-dependencies]
# Ephemeral self-signed certs (server + CA-signed client + untrusted client) for the TLS listener
# handshake / client-cert-rejection tests. Test-only; never compiled into the node.
rcgen = "0.13"
# Temp files for the on-disk cert/key paths `build_server_config` reads in the TLS tests.
tempfile = "3"

[lints]
workspace = true
