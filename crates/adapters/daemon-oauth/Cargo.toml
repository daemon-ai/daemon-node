[package]
name = "daemon-oauth"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true

# The generic OAuth2 / OIDC authorization-code + PKCE interactive-auth family
# (daemon-interactive-auth-spec.md §7, roadmap A2): a production `AuthFlowFactory` for
# `AuthFlowKind::OAuth2Pkce`, registered by the daemon binary next to the Matrix SSO factory.
# Params-driven (endpoints + client_id arrive in `auth_begin.params`), so it serves any
# authorization-code IdP without per-provider config. Token exchange goes through the one
# SSRF-safe `daemon-egress` client; no raw reqwest client is built here.
[dependencies]
daemon-api = { workspace = true }
daemon-host = { workspace = true }
daemon-protocol = { workspace = true }
daemon-egress = { workspace = true }
async-trait = { workspace = true }
serde_json = { workspace = true }
# PKCE: S256 code-challenge (sha2) over a base64url verifier/state minted from OS entropy.
sha2 = { workspace = true }
base64 = { workspace = true }
getrandom = "0.2"
# authorization-URL query building + callback query parsing (form_urlencoded).
url = { workspace = true }

[dev-dependencies]
tokio = { workspace = true, features = ["macros", "rt-multi-thread", "time"] }
# The mock IdP token endpoint the integration test drives the exchange against.
wiremock = { workspace = true }

[lints]
workspace = true
