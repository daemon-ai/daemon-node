[package]
name = "daemon-wechat"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true

# The WeChat chat transport: an in-process `NodeApi`-client adapter (the `daemon-matrix` shape). It
# isolates the `wechatbot` iLink Bot SDK and drives *our* engine as a client — normalising iLink
# long-poll updates into `Origin`s and handing them to the reusable `daemon-ingest` gate (inbound),
# and projecting the session's outbound merged log back to iLink `sendmessage` calls via a
# `daemon-delivery` `Projector` (outbound). All `wechatbot` types stay confined to this crate.
[dependencies]
daemon-api = { workspace = true }
daemon-protocol = { workspace = true }
daemon-common = { workspace = true }
# the in-process bring-up seams (not wire): AccountProvisioning (enumerate bound wechat accounts +
# resolve/write-back session blobs) and the interactive-auth factory/flow traits.
daemon-host = { workspace = true }
# the two reusable transport-agnostic halves this adapter plugs into.
daemon-delivery = { workspace = true }
daemon-ingest = { workspace = true }
# The WeChat iLink Bot SDK. `wechatbot` exposes both the high-level `WeChatBot` dispatcher and the
# low-level `protocol::ILinkClient` (QR login + long-poll `getupdates` + `sendmessage`); we drive the
# low-level client so credential material stays authoritative in the daemon `CredentialStore` (the
# high-level client persists credentials to its own on-disk file). Young ecosystem — see lib.rs.
wechatbot = "0.4"
# `wechatbot` pulls `reqwest` with its default (native-tls) TLS backend, which links `openssl-sys`.
# This is a rustls-only devShell with no system OpenSSL on PKG_CONFIG_PATH, so force `openssl-sys` to
# build a vendored copy from source (perl + cc + make are in the shell). We do not use the OpenSSL API
# ourselves — this dep exists solely to satisfy the SDK's transitive TLS backend at link time.
openssl-sys = { version = "0.9", features = ["vendored"] }
tokio = { workspace = true }
async-trait = { workspace = true }
futures = { workspace = true }
tracing = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
anyhow = { workspace = true }

[dev-dependencies]
tokio = { workspace = true, features = ["macros", "rt-multi-thread", "sync", "time"] }

[lints]
workspace = true
