[package]
name = "daemon-train-client"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true

[lib]
path = "src/lib.rs"

[dependencies]
# Node-side supervisor: spawn / respawn / meltdown + the worker protocol client, mirroring
# `daemon-metta-client` (LocalProvider ↔ daemon-infer). It links only the light node-side crates —
# never wasmtime / Burn — so the daemon process stays out of the worker fault domain (§10.1).
daemon-common = { workspace = true }
daemon-provision = { workspace = true }
tokio = { workspace = true }
thiserror = { workspace = true }

[dev-dependencies]
tokio = { workspace = true }

[lints]
workspace = true

[package.metadata.cargo-machete]
# Wired up during Wave-0 scaffolding; the supervisor client lands with lane R.
ignored = ["daemon-common", "daemon-provision", "tokio"]
