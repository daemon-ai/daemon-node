[package]
name = "daemon-train"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true

[lib]
path = "src/lib.rs"

[[bin]]
name = "daemon-train"
path = "src/bin/daemon-train.rs"

[dependencies]
daemon-swarm-proto = { workspace = true }
# Host worker runtime: the wasm module sandbox (wasmtime) + the training engine (Burn, ndarray
# backend + autodiff; NO GPU backends in the default gate) + content hashing for artifact / tensor
# digests (blake3, xxh3). swarm-training-spec.md §5.1, §10.1. Heavy trees on purpose: this crate is
# the worker fault domain and is built out-of-gate per backend lane in the real product.
wasmtime = { workspace = true }
burn = { workspace = true }
blake3 = { workspace = true }
xxhash-rust = { workspace = true }
thiserror = { workspace = true }
# The shared fixed-order fp32 det-lane kernels (bit-exact sim ≡ host, ABI §5.9) + the CBOR codec for
# the manifest/config contract (ABI §6.1/§6.2). det-core is zero-dep; serde/ciborium are already pins.
det-core = { workspace = true }
serde = { workspace = true }
ciborium = { workspace = true }

[lints]
workspace = true

[package.metadata.cargo-machete]
# `wasmtime` (host runtime) is used; `burn` is the Wave-2 `OpBackend` engine (declared now, wired
# then — the CPU fake needs no burn). NOTE (Merge 1): burn should move to a feature-gated / lane-split
# build off the default gate (program ledger); deferred this wave to avoid a full wasmtime recompile.
ignored = ["wasmtime", "burn"]
