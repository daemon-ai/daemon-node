[package]
name = "daemon-metta-client"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true

[lib]
path = "src/lib.rs"

[dependencies]
# Protocol only — `default-features = false` keeps `hyperon` (and the engine) out of the daemon.
daemon-metta = { workspace = true }
daemon-provision = { workspace = true }
daemon-common = { workspace = true }
serde = { workspace = true }
thiserror = { workspace = true }
tokio = { workspace = true }
tracing = { workspace = true }

[dev-dependencies]
tokio = { workspace = true }

[lints]
workspace = true

[package.metadata.cargo-machete]
# False positives / deps wired up during active development (macro- or feature-only use that
# cargo-machete cannot see, or in-progress crates). Intentional; do not auto-remove.
ignored = ["serde"]
