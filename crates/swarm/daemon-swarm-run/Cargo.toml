[package]
name = "daemon-swarm-run"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true

[lib]
path = "src/lib.rs"

[features]
# `harness` exposes the in-process multi-peer test harness + the real `daemon-swarm-coordinator`
# pure `tick` loop driver (the impure shell that signs/publishes the coordinator's unsigned
# RoundOpen/RoundRecord outputs and feeds it signed peer messages + StorageReceipt evidence + scripted
# Clock inputs) to external crates. Kept out of the default build; the `tests/daemon-swarm-e2e` crate
# enables it. The crate's own unit tests reach the harness via `cfg(test)` (no feature needed).
harness = ["dep:daemon-swarm-coordinator", "dep:daemon-swarm-observe"]

[dependencies]
daemon-swarm-proto = { workspace = true }
daemon-swarm-net = { workspace = true }
# The pure coordinator `tick` state machine ŌĆö driven by the Merge-2 harness shell (feature-gated, so
# it stays out of the default participant-runtime build). Not a root Cargo.toml change: the path dep
# is already declared in the frozen `[workspace.dependencies]`.
daemon-swarm-coordinator = { workspace = true, optional = true }
# Observe drives the desync verdict (digest tally / `DesyncVerdict`, ┬¦9) the harness + checkpoint
# resync trigger consume. Node-side std tool, `harness`-gated so it stays off the default
# participant build. Path dep already in the frozen root `[workspace.dependencies]` (no root edit),
# and observe depends only on proto + coordinator (no cycle back to `daemon-swarm-run`).
daemon-swarm-observe = { workspace = true, optional = true }
tokio = { workspace = true }
thiserror = { workspace = true }
# The harness `FaultyStore` implements the async `PayloadStore` trait (harness / test only, gated
# behind `cfg(any(test, feature = "harness"))`).
async-trait = { workspace = true }
# Worker protocol codec (┬¦10.2) + manifest/backend wire shapes.
serde = { workspace = true }
ciborium = { workspace = true }
# The pre-tokenized corpus manifest is JSON (`manifest.json`, ┬¦8).
serde_json = { workspace = true }
# Per-shard content addressing in the manifest (blake3, ┬¦8).
blake3 = { workspace = true }
# Deterministic synthetic corpus + StubBackend fake "updates" and the xxh3-128 state digest (┬¦5.6).
xxhash-rust = { workspace = true }

[dev-dependencies]
# The crate's own `cfg(test)` harness tests exercise the real coordinator `tick` loop (the same code
# external crates reach behind `feature = "harness"`), so the coordinator must be available for tests
# even with the feature off.
daemon-swarm-coordinator = { workspace = true }
# Same as the coordinator: the `cfg(test)` harness build uses observe's `digest_tally` / `DesyncVerdict`
# (the desync trigger) even with the `harness` feature off.
daemon-swarm-observe = { workspace = true }
# The `[swarm]` config-section extraction test (┬¦10.6) layers a figment the way the node config does;
# `test` adds `figment::Jail` for hermetic env fixtures. Test-only ŌĆö the struct itself is serde-only.
figment = { workspace = true, features = ["test"] }

[lints]
workspace = true

[package.metadata.cargo-machete]
# `async-trait` is used only by the harness `FaultyStore` PayloadStore impl, gated behind
# `cfg(any(test, feature = "harness"))`, so it looks unused on the default (non-test) build path.
ignored = ["async-trait"]
