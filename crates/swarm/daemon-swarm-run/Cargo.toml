[package]
name = "daemon-swarm-run"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true

[lib]
path = "src/lib.rs"

[dependencies]
daemon-swarm-proto = { workspace = true }
daemon-swarm-net = { workspace = true }
tokio = { workspace = true }
thiserror = { workspace = true }
# Worker protocol codec (§10.2) + manifest/backend wire shapes.
serde = { workspace = true }
ciborium = { workspace = true }
# The pre-tokenized corpus manifest is JSON (`manifest.json`, §8).
serde_json = { workspace = true }
# Per-shard content addressing in the manifest (blake3, §8).
blake3 = { workspace = true }
# Deterministic synthetic corpus + StubBackend fake "updates" and the xxh3-128 state digest (§5.6).
xxhash-rust = { workspace = true }

[lints]
workspace = true

[package.metadata.cargo-machete]
# `tokio` is declared for the Wave-2 round loop; the Wave-1 seams (data pipeline, TrainerBackend,
# worker protocol codec) are synchronous.
ignored = ["tokio"]
