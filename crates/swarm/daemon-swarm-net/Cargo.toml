[package]
name = "daemon-swarm-net"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true

[lib]
path = "src/lib.rs"

[dependencies]
daemon-swarm-proto = { workspace = true }
# `ContainedRoot` (openat2 RESOLVE_BENEATH|NO_SYMLINKS) is the sanctioned fs surface: the
# `FsPayloadStore` is rooted at one so peer-supplied key components can never escape the store root
# (the workspace-wide clippy fs ban points here).
daemon-core = { workspace = true }
tokio = { workspace = true }
# The artifact-fetch / presign egress plane (§7.1). NOTE for lane R: raw `reqwest::Client` is
# banned workspace-wide by clippy (`disallowed_types`, see clippy.toml); outbound HTTP must be
# built through `daemon_egress::EgressClient`. Declared here for the transport surface; no client
# is constructed this wave (file:// artifact fetch only).
reqwest = { workspace = true }
thiserror = { workspace = true }
async-trait = { workspace = true }
serde = { workspace = true }
ciborium = { workspace = true }
# The iroh transport plane (§7): the gossip control plane (`IrohGossip: ControlPlane`, B2 Wave 2) +
# the self-hosted relay. OPTIONAL — gated behind the `iroh` feature so the default workspace build
# never compiles the heavy iroh/QUIC/relay tree (spec §10.1). NO iroh-blobs (P4). B2 may add feature
# tuning (e.g. `iroh-relay/server`, `test-utils`) here — a lane-owned member edit, not a root change.
iroh = { workspace = true, optional = true }
iroh-gossip = { workspace = true, optional = true }
iroh-relay = { workspace = true, optional = true }

[features]
# Off by default: the default workspace gate builds no iroh. B2 (Wave 2) implements `iroh_gossip.rs`
# behind this feature; the Wave-0/Merge-1 gate is a compile-only `cargo check --features iroh`.
iroh = ["dep:iroh", "dep:iroh-gossip", "dep:iroh-relay"]

[lints]
workspace = true

[package.metadata.cargo-machete]
# `reqwest` is declared for the egress plane (§7.1) but no HTTP client is constructed this wave
# (file:// artifact fetch only); r2/hf/https slot in later through daemon-egress. `iroh*` are declared
# for the B2 gossip plane (behind the `iroh` feature) but not yet referenced in src this wave.
ignored = ["reqwest", "iroh", "iroh-gossip", "iroh-relay"]
