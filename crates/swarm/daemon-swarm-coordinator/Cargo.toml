[package]
name = "daemon-swarm-coordinator"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true

[lib]
path = "src/lib.rs"

[dependencies]
daemon-swarm-proto = { workspace = true }
# The local/private coordinator harness serves the state machine over axum/WS; the same crate also
# exports a `wasm32` build for the cloud DO (§11.2). axum is host-only, so the wasm export gates it
# out — declared here for the host harness surface.
axum = { workspace = true }
tokio = { workspace = true }
thiserror = { workspace = true }

[lints]
workspace = true

[package.metadata.cargo-machete]
# Wired up during Wave-0 scaffolding; the coordinator harness lands with lane P.
ignored = ["axum", "tokio"]
