[package]
name = "daemon-context-lcm"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
description = "Native Rust port of hermes-lcm as the default daemon-core ContextEngine (in-session context management)."

[features]
default = []

[dependencies]
daemon-core = { workspace = true }
daemon-common = { workspace = true }
async-trait = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }
tracing = { workspace = true }
rusqlite = { version = "0.37", features = ["bundled", "backup"] }
rusqlite_migration = { workspace = true }
tiktoken-rs = "0.6"
tokio = { workspace = true }
regex = { workspace = true }
sha2 = { workspace = true }
base64 = { workspace = true }

[dev-dependencies]
tokio = { workspace = true }
daemon-protocol = { workspace = true }

[lints]
workspace = true

[package.metadata.cargo-machete]
# False positives / deps wired up during active development (macro- or feature-only use that
# cargo-machete cannot see, or in-progress crates). Intentional; do not auto-remove.
ignored = ["base64"]
