[package]
name = "daemon-core"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true

[dependencies]
daemon-common = { workspace = true }
daemon-protocol = { workspace = true }
async-trait = { workspace = true }
serde = { workspace = true }
thiserror = { workspace = true }
tokio = { workspace = true }
tokio-util = { workspace = true }
ciborium = { workspace = true }
futures = { workspace = true }
strsim = { workspace = true }
serde_json = { workspace = true }
# UTS#46 IDNA/punycode normalization for the `check_url` egress guard (safety/url.rs).
idna = { workspace = true }
# Command-fingerprint hashing (Cluster B exec-approval): SHA-256 over the resolved command tuple so an
# approval decision is bound to what will actually run (the approve-then-swap TOCTOU gate).
sha2 = { workspace = true }
# best-effort observability for the §12 checkpoint stage (capture/restore failures never fail a turn,
# so they are logged rather than propagated). The only logging dep in the otherwise log-free core.
tracing = { workspace = true }

# Interim symlink/TOCTOU guard (Cluster C, `exec::open_read_guarded`/`open_write_guarded`): the
# `O_NOFOLLOW` open flag. Unix-only so the non-unix build falls back to `symlink_metadata` and never
# links libc.
[target.'cfg(unix)'.dependencies]
libc = { workspace = true }

[features]
# OFF by default. Gates recording the OpenTelemetry GenAI attributes (incl. full prompt/completion/
# tool content) onto the engine's turn/model/tool spans. When off, the spans are unchanged and no
# session content is ever attached — so the default build's logs and behaviour are identical. The
# daemon binary turns this on transitively via its own `otel` feature (with `daemon-telemetry/otel`).
otel = []

[lints]
workspace = true
