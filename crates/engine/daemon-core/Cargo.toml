[package]
name = "daemon-core"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true

[dependencies]
daemon-common = { workspace = true }
daemon-protocol = { workspace = true }
async-trait = { workspace = true }
serde = { workspace = true }
thiserror = { workspace = true }
tokio = { workspace = true }
tokio-util = { workspace = true }
ciborium = { workspace = true }
futures = { workspace = true }
strsim = { workspace = true }
serde_json = { workspace = true }
# best-effort observability for the §12 checkpoint stage (capture/restore failures never fail a turn,
# so they are logged rather than propagated). The only logging dep in the otherwise log-free core.
tracing = { workspace = true }

[features]
# OFF by default. Gates recording the OpenTelemetry GenAI attributes (incl. full prompt/completion/
# tool content) onto the engine's turn/model/tool spans. When off, the spans are unchanged and no
# session content is ever attached — so the default build's logs and behaviour are identical. The
# daemon binary turns this on transitively via its own `otel` feature (with `daemon-telemetry/otel`).
otel = []

[lints]
workspace = true
