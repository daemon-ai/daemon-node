[package]
name = "daemon-skills"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true

[dependencies]
daemon-core = { workspace = true }
# the shared RevisionLog contract: skill writes (incl. the agent's background-review) record a
# revision so skills are versioned with operator/agent provenance.
daemon-common = { workspace = true }
serde = { workspace = true }
serde_yaml = { workspace = true }
# JSON (de)serialization of the per-profile `.usage.json` usage + lifecycle sidecar.
serde_json = { workspace = true }
thiserror = { workspace = true }
# Structured logging for per-profile seeding / curation diagnostics.
tracing = { workspace = true }
# CBOR (de)serialization of a portable skill bundle (the snapshot blob + distribution payload).
ciborium = { workspace = true }
# Optional skill-bundle signing (wire v28, default-off): the same in-tree ed25519 / Gordian Envelope
# stack used by daemon-credentials capability leases — bc-envelope for the deterministic digest,
# bc-components for the ed25519 key + Signature. Already vetted in-tree (no new crate in the graph).
bc-components = { workspace = true }
bc-envelope = { workspace = true }
# Embeds the curated bundled-skills tree (`bundled/`) into the binary so a deployed daemon can seed
# the profile's skills dir with no repo/filesystem dependency (parity with hermes' wheel-data bundle).
include_dir = "0.7"

[dev-dependencies]
tempfile = "3"

[lints]
workspace = true
