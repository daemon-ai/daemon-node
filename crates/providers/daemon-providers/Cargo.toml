[package]
name = "daemon-providers"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true

[dependencies]
daemon-core = { workspace = true }
daemon-common = { workspace = true }
# Crash-reporting correlation env (`crash::correlation_env`) injected into spawned infer workers so
# a worker crash correlates with the node in one Sentry project. Light dep (no engine libs).
daemon-telemetry = { workspace = true }
# The local-inference worker: only the light `protocol` module is needed here (no engine, no ML
# tree). The workspace dep is default-features = false, so this stays cheap.
daemon-infer = { workspace = true }
# Model resolution (resolve-before-load + runtime activation) for the switchable local provider.
daemon-models = { workspace = true }
daemon-provision = { workspace = true }
genai = { workspace = true }
async-trait = { workspace = true }
serde_json = { workspace = true }
futures = { workspace = true }
tokio = { workspace = true }
tokio-util = { workspace = true }
tracing = { workspace = true }

[dev-dependencies]
wiremock = { workspace = true }
tokio = { workspace = true }
daemon-infer = { workspace = true }
daemon-core = { workspace = true }
futures = { workspace = true }

[lints]
workspace = true

[package.metadata.cargo-machete]
# False positives / deps wired up during active development (macro- or feature-only use that
# cargo-machete cannot see, or in-progress crates). Intentional; do not auto-remove.
ignored = ["tokio-util"]
