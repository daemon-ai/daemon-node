[package]
name = "daemon-infer"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true

[lib]
path = "src/lib.rs"

[[bin]]
name = "daemon-infer"
path = "src/bin/daemon-infer.rs"

[features]
# Default = stub worker only. No engine, no cmake, no ML tree — keeps `cargo test --workspace` light.
default = []
# Engine selectors (the worker compiles a backend in when one of these is on).
llama = ["dep:llama-cpp-4", "dep:encoding_rs"]
# Multimodal projector loading (llama.cpp mtmd): the worker loads a paired mmproj GGUF alongside
# the text weights at `Command::Load` (media *inference* is a later phase — this validates and
# holds the projector). Separate from `llama` because the dev-shell prebuilt
# (`LLAMA_PREBUILT_DIR`, built with LLAMA_BUILD_TOOLS=OFF) carries no libmtmd — the sandboxed
# from-source lanes (`nix build .#daemon-infer-llama`) enable it.
mtmd = ["llama", "llama-cpp-4/mtmd"]
# Link a prebuilt *shared* llama.cpp (via `LLAMA_PREBUILT_DIR`) instead of static-compiling it from
# source. Used in the Nix dev shell to skip cmake on hosts without `/bin/sh`.
dynamic-link = ["llama-cpp-4/dynamic-link"]
# llama.cpp hardware backends (each implies `llama` and forwards to the llama-cpp-4 feature). ROCm
# is `hip` (llama-cpp-4 naming).
cuda = ["llama", "llama-cpp-4/cuda"]
vulkan = ["llama", "llama-cpp-4/vulkan"]
hip = ["llama", "llama-cpp-4/hip"]
metal = ["llama", "llama-cpp-4/metal"]
opencl = ["llama", "llama-cpp-4/opencl"]
# mistral.rs engine (async). Hardware backends forward to the mistralrs crate's features.
mistralrs = ["dep:mistralrs"]
mistralrs-cuda = ["mistralrs", "mistralrs/cuda"]
mistralrs-metal = ["mistralrs", "mistralrs/metal"]

[dependencies]
clap = { workspace = true }
# Protocol (light; this is all `daemon-providers` pulls with default-features = false).
serde = { workspace = true }
serde_json = { workspace = true }
ciborium = { workspace = true }
thiserror = { workspace = true }
# Worker runtime + the engine-agnostic backend seam.
async-trait = { workspace = true }
tokio = { workspace = true }
tokio-util = { workspace = true }
futures = { workspace = true }
tracing = { workspace = true }
daemon-provision = { workspace = true }
# Optional engines — feature-gated, never built in the default/stub workspace gate.
llama-cpp-4 = { workspace = true, optional = true }
encoding_rs = { workspace = true, optional = true }
mistralrs = { workspace = true, optional = true }

[lints]
workspace = true

[package.metadata.cargo-machete]
# False positives / deps wired up during active development (macro- or feature-only use that
# cargo-machete cannot see, or in-progress crates). Intentional; do not auto-remove.
ignored = ["futures"]
