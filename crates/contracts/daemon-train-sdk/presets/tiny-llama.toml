# The **tiny** tiny-llama reference config — an `[experiment.config]` fragment (spec §6.1). This is
# `TinyLlamaCfg::default()`: a genuinely small LLaMA-family decoder for the deterministic sim/host
# lifecycle tests (the wasm guest and the sim backend run the identical `TinyLlama` code). The
# canonical byte form is `tiny-llama.cbor` (alongside). Kept in lockstep with
# `daemon_train_sdk::models::TinyLlamaCfg::default()`.
d_model = 64
n_layers = 2
n_heads = 4
n_kv_heads = 4
head_dim = 16
vocab = 64
seq_len = 9
ffn_mult = 2
rope_theta = 10000.0
rmsnorm_eps = 1e-5
profile = "sparse_loco"

[inner]
lr = 4e-4
beta1 = 0.9
beta2 = 0.95
eps = 1e-8
wd = 0.1

[sparse_loco]
h = 3
ef_decay = 0.95
chunk = 64
topk = 8
bits = 2
outer_alpha = 1.0
clip = false
