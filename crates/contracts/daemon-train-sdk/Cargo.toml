[package]
name = "daemon-train-sdk"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true

[lib]
path = "src/lib.rs"

[dependencies]
# Guest-side SDK: it compiles to `wasm32-unknown-unknown` inside experiment modules, so its whole
# dependency surface is `serde` (composition/profile schema) + `ciborium` (the CBOR codec over the
# tensor ABI). Nothing host-only (no tokio / wasmtime / Burn) — swarm-training-spec.md §10.1.
serde = { workspace = true }
ciborium = { workspace = true }

[lints]
workspace = true

[package.metadata.cargo-machete]
# Wired up during Wave-0 scaffolding; the Burn-like composition surface lands with lane E.
ignored = ["serde", "ciborium"]
