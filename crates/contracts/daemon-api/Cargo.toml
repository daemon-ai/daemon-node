[package]
name = "daemon-api"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true

[dependencies]
daemon-common = { workspace = true }
daemon-protocol = { workspace = true }
serde = { workspace = true }
serde_bytes = { workspace = true }
async-trait = { workspace = true }
ciborium = { workspace = true }
thiserror = { workspace = true }
futures = { workspace = true }
arbitrary = { workspace = true, optional = true }

[features]
# See daemon-common: feature-gated `Arbitrary` derives for the CDDL conformance proptest.
arbitrary = ["dep:arbitrary", "daemon-common/arbitrary", "daemon-protocol/arbitrary"]

[dev-dependencies]
tokio = { workspace = true }
serde_json = { workspace = true }
# W1-A conformance harness. The daemon-api <-> daemon-api-testkit dev-dependency cycle is permitted
# by cargo (testkit depends on daemon-api as a normal dep; daemon-api depends on it only for tests).
daemon-api-testkit = { workspace = true }
# Conformance gate: validate real ciborium wire bytes against the authoritative daemon-api.cddl so
# serde<->CDDL drift becomes a failing test. In-process (no external CDDL toolchain).
cddl-cat = "0.7.1"
proptest = { workspace = true }

[lints]
workspace = true
