[package]
name = "daemon-node"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true

# The single host-composition root: assembles the durable substrate, the orchestration fleet (as the
# real job worker), the credential seam, and the live session surface into one running node. Both the
# `daemon` binary and the conformance harness build their node through this crate, so there is one
# wiring to keep correct. It sits *above* `daemon-host` because the fleet + orchestrate-tool glue is
# composition-layer policy (`daemon-host` deliberately does not depend on `daemon-orchestration`).
[dependencies]
daemon-common = { workspace = true }
daemon-core = { workspace = true }
daemon-store = { workspace = true }
# The durable activation seam (Incarnation / EngineFactory): the node's dispatching engine factory
# routes a delegated child to a Core or foreign incarnation on this path.
daemon-activation = { workspace = true }
daemon-schedule = { workspace = true }
daemon-host = { workspace = true }
daemon-protocol = { workspace = true }
daemon-acp = { workspace = true }
daemon-orchestration = { workspace = true }
daemon-tool-orchestrate = { workspace = true }
daemon-tool-cron = { workspace = true }
# The agent `profile_manage` tool: authors reusable profiles through the shared `ProfileOps` the
# operator create path uses; registered onto the orchestrator-capable profile.
daemon-tool-profile = { workspace = true }
daemon-tool-fs = { workspace = true }
daemon-tool-shell = { workspace = true }
daemon-tool-process = { workspace = true }
# The host-owned background-process registry: constructed once here, shared by the shell/process
# tools and the exit notifier (which injects into sessions through the assembled NodeApi).
daemon-processes = { workspace = true }
tracing = { workspace = true }
daemon-provision = { workspace = true }
daemon-supervision = { workspace = true }
daemon-api = { workspace = true }
daemon-telemetry = { workspace = true }
daemon-models = { workspace = true }
# the skills store: the node threads it (with its revision log) into the api surface for skill
# versioning + the skill payload of a profile distribution.
daemon-skills = { workspace = true }
# The prompt content + stores (hermes parity): PersonaStore (SOUL.md) / UserProfileStore (USER.md),
# the role persona library, and the gated guidance builders the node composes into engine prompts.
daemon-prompt = { workspace = true }
# The composed prompt's date-only stamp (hermes "%A, %B %d, %Y"), formatted at composition time.
chrono = { workspace = true }
# The subdirectory hint observer parses tool-call argument JSON for workspace paths.
serde_json = { workspace = true }
async-trait = { workspace = true }
# The host fleet event bus (I4/I8) is a `tokio::sync::broadcast` channel threaded through the
# assembled producers (FleetRuntime/FleetJobWorker) into the tree-push surface.
tokio = { workspace = true }

[dev-dependencies]
# Smoke-test the wired-in defaults (LCM context + Mnemosyne memory) end-to-end through an engine turn.
tokio = { workspace = true }
daemon-context-lcm = { workspace = true }
daemon-mnemosyne = { workspace = true }
# Persona-resolution tests run a real PersonaStore over a scratch dir.
tempfile = "3"

[lints]
workspace = true
