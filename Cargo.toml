# Size-tuned release profile (the flake's crane buildPackage builds --release, so Nix outputs
# inherit this). Measured on the full workspace: together these take the `daemon` binary
# 124 MiB -> 57 MiB (-54%) and `daemon-cli` 6.4 MiB -> 3.3 MiB (-49%).
[profile.release]
panic = "unwind"   # REQUIRED: catch_unwind supervision is void under abort (see docs/research/beam-substrate-reference-extraction.md §2.2)
strip = "symbols"  # -21% alone: drop .symtab/.strtab; unwinding (.eh_frame) is kept, only backtrace symbol names go
lto = "thin"       # cross-crate DCE+inlining; -3% size on top of opt-s/cgu1 (-17% on daemon-cli) at ~no wall cost
opt-level = "s"    # -31% vs opt 3 at same settings; hot compute (ggml, aws-lc-rs, SQLite) is C/asm built at its own -O3, the Rust side is control plane + CBOR framing
codegen-units = 1  # -17% more (better DCE/less duplication); full rebuild 5m08 -> 6m09 on 32 cores, and thin-LTO link stays parallel

# Crash-symbol profile (Sentry). Inherits the shipped `release` profile EXACTLY but keeps debug
# line tables and does NOT strip, so a build under this profile yields binaries whose DWARF
# `sentry-cli debug-files upload --include-sources` can ingest to symbolicate release minidumps.
# The shipped `release` profile above is UNTOUCHED — normal `--release` builds (and every Nix
# output, which builds `--release`) stay byte-identical and small; CI builds `--profile
# release-symbols` as a SEPARATE step purely to extract debug files (the stripped release binaries
# are what ships). `panic = "unwind"` is preserved (never abort). Closure-size impact: none on the
# shipped artifacts; the release-symbols binaries are larger (unstripped + line tables) but are
# upload-only and never packaged. `debug = "line-tables-only"` keeps them far smaller than full
# `debug = 2` while still giving file/line/function symbolication.
[profile.release-symbols]
inherits = "release"
strip = false
debug = "line-tables-only"

[profile.dev]
panic = "unwind"
