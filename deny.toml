# cargo-deny configuration. See https://embarkstudios.github.io/cargo-deny/

[advisories]
version = 2
yanked = "deny"
# Documented, per-advisory decisions (NOT a blanket suppression). Vulnerabilities are NOT ignored:
# the one real vuln in the tree (RUSTSEC-2023-0071, rsa "Marvin" timing attack) was removed at the
# source by dropping the unused `ssh`/`pqcrypto` features on bc-envelope/bc-components (see
# Cargo.toml), which also dropped the 4 archived pqcrypto-* unmaintained advisories.
#
# The two below are unmaintained-status advisories only (no CVE), both compile-time proc-macros with
# no runtime attack surface, and both unavoidable: their sources are already at the latest published
# version and pull them as unconditional (non-optional) dependencies, so they cannot be bumped or
# feature-gated away without forking/dropping bc-envelope or matrix-sdk. A real CVE would carry a new
# advisory ID and still fail this gate. Re-evaluate when bc-envelope / matrix-sdk publish updates.
ignore = [
  "RUSTSEC-2024-0436", # paste: unmaintained; unconditional build-dep of bc-envelope 0.43 (latest)
  "RUSTSEC-2026-0173", # proc-macro-error2: unmaintained; via matrix-sdk 0.18 (latest) -> aquamarine
  # ttf-parser: unmaintained-status advisory only (no CVE). Unconditional dep of lopdf 0.42
  # (latest) via pdf-extract 0.12 (latest) — the `fs` tool's PDF text extraction. Unlike the two
  # above it does parse input at runtime, but the exposure is bounded: input is workspace-contained
  # document bytes, capped at 50 MB, parsed on an isolated blocking task whose panic is contained
  # and reported as an extraction failure (never a crash), and PDF extraction is behind the
  # `extract` cargo feature. Re-evaluate when pdf-extract/lopdf move off ttf-parser (upstream
  # suggests `skrifa`).
  "RUSTSEC-2026-0192",
]

[bans]
multiple-versions = "warn"
wildcards = "deny"
# Internal workspace crates are path deps (no version), which cargo-deny otherwise flags as
# wildcards. Allow that specifically while still denying real `version = "*"` on registry crates.
allow-wildcard-paths = true

[licenses]
version = 2
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-3-Clause",
  "BSD-2-Clause",
  "ISC",
  "Unicode-3.0",
  # Added after the dependency audit - all permissive or file-level weak-copyleft (MPL), safe to
  # link against. Each appears only in transitive dependencies.
  "MPL-2.0",
  "BSD-2-Clause-Patent",
  "Zlib",
  "CC0-1.0",
  "CDLA-Permissive-2.0",
  "BSL-1.0",
  "BlueOak-1.0.0",
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
